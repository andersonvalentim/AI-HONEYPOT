[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    Plugins_File plugins.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On
    HC_Period    30
    HC_Errors_Count 3

[INPUT]
    Name              tail
    Path              /var/log/opencanary/opencanary.log
    Tag               honeypot.opencanary
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /tmp/flb_opencanary.db
    Read_from_Head    true
    Parser            json

[INPUT]
    Name              tail
    Path              /var/log/opencanary/ai-decoy.log
    Tag               honeypot.ai
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /tmp/flb_ai_decoy.db
    Read_from_Head    true
    Parser            json

[FILTER]
    Name              modify
    Match             honeypot.opencanary
    Add               source opencanary
    Add               honeypot_env ${HONEYPOT_ENV}

[FILTER]
    Name              record_modifier
    Match             honeypot.opencanary
    Record            audit_pipeline fluent-bit

[FILTER]
    Name              modify
    Match             honeypot.ai
    Add               source ai-decoy
    Add               honeypot_env ${HONEYPOT_ENV}

[FILTER]
    Name              record_modifier
    Match             honeypot.ai
    Record            audit_pipeline fluent-bit

[OUTPUT]
    Name              logzio
    Match             honeypot.opencanary
    Workers           1
    logzio_token      ${LOGZIO_TOKEN}
    logzio_url        https://${LOGZIO_LISTENER_HOST}:${LOGZIO_LISTENER_PORT}
    logzio_type       honeypot-opencanary
    logzio_debug      false
    id                logzio_opencanary

[OUTPUT]
    Name              logzio
    Match             honeypot.ai
    Workers           1
    logzio_token      ${LOGZIO_TOKEN}
    logzio_url        https://${LOGZIO_LISTENER_HOST}:${LOGZIO_LISTENER_PORT}
    logzio_type       honeypot-ai-decoy
    logzio_debug      false
    id                logzio_ai_decoy

[OUTPUT]
    Name              stdout
    Match             honeypot.*
