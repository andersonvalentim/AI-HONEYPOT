[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    debug
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On
    HC_Period    30
    HC_Errors_Count 3

[INPUT]
    Name              tail
    Path              /var/log/opencanary/opencanary.log
    Tag               honeypot.opencanary
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /tmp/flb_opencanary.db
    Read_from_Head    true
    Parser            json

[INPUT]
    Name              tail
    Path              /var/log/opencanary/ai-decoy.log
    Tag               honeypot.ai
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /tmp/flb_ai_decoy.db
    Read_from_Head    true
    Parser            json

[FILTER]
    Name              modify
    Match             honeypot.opencanary
    Add               source opencanary
    Add               honeypot_env ${HONEYPOT_ENV}
    Add               type honeypot-opencanary

[FILTER]
    Name              record_modifier
    Match             honeypot.opencanary
    Record            audit_pipeline fluent-bit

[FILTER]
    Name              modify
    Match             honeypot.ai
    Add               source ai-decoy
    Add               honeypot_env ${HONEYPOT_ENV}
    Add               type honeypot-ai-decoy

[FILTER]
    Name              record_modifier
    Match             honeypot.ai
    Record            audit_pipeline fluent-bit

[OUTPUT]
    Name              http
    Match             honeypot.*
    Host              ${LOGZIO_LISTENER_HOST}
    Port              ${LOGZIO_LISTENER_PORT}
    URI               /?token=${LOGZIO_TOKEN}&type=honeypot
    Format            json_lines
    tls               On
    tls.verify        On
    Header            Content-Type application/json
    Retry_Limit       5
    net.keepalive     On
    compress          gzip

[OUTPUT]
    Name              stdout
    Match             honeypot.*
